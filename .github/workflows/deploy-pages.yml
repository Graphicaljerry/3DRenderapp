name: Deploy Moldable to GitHub Pages
# Publishes moldable-lite/ to GitHub Pages from main (github-pages env allows main).

on:
  push:
    branches: [main]
    paths:
      - "moldable-lite/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moldable-lite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Build (base = /<repo>/)
        run: npm run build
        env:
          # Must match the repository name so asset URLs resolve under Pages.
          BUILD_BASE: /3DRenderapp/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: moldable-lite/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # The Pages service intermittently rejects deployments with a transient
      # "Deployment failed, try again later" (hit twice on 2026-07-02/03) —
      # wait and retry twice before declaring the run failed.
      - name: Retry deploy (transient Pages-service errors)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Second retry
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 120
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
